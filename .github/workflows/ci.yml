name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build
        run: dotnet build --configuration Release
      - name: Test with coverage (gated at 90% line coverage)
        run: ./scripts/coverage.sh 90 --configuration Release
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-report/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run Playwright suite (extension + native host)
        working-directory: e2e
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/

  package-dry-run:
    # Proves the packaging pipeline (scripts/package-extension.sh and
    # scripts/package-bundle.sh, plus what they depend on -- generate-icons.py,
    # extension/manifest.json, the native host's self-contained publish) still produces
    # valid artifacts. These are the same scripts release-candidate.yml and
    # release-extension.yml invoke for real releases, but neither triggers on a PR, so
    # without this job a regression in packaging would only surface at release time.
    # The bundle is built for just one platform here to keep PR runs fast; the release
    # workflows build the full desktop matrix. Runs on every push and PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Package extension
        run: ./scripts/package-extension.sh dist
      - name: Package all-in-one bundle (linux-x64 only, smoke check for the release matrix)
        run: ./scripts/package-bundle.sh linux-x64 dist
      - uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-extension-dry-run
          path: dist/pdf-editor-extension-*.zip
          if-no-files-found: error
          retention-days: 7
