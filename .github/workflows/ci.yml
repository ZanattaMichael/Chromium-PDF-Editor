name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build
        run: dotnet build --configuration Release
      - name: Test with coverage (gated at 90% line coverage)
        run: ./scripts/coverage.sh 90 --configuration Release
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-report/

  perf:
    # Performance guards: absolute-time budgets and algorithmic-scaling checks for the core
    # operations behind the editor. Budgets are generous backstops that catch gross regressions
    # (an accidental O(n²), a broken cache, a full-document reprocess) rather than micro-changes.
    # PDF_EDITOR_PERF_SLACK relaxes every budget uniformly to absorb the variance of shared CI
    # runners, so this stays a reliable signal, not a flaky gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build
        run: dotnet build tests/PdfEditor.Perf.Tests --configuration Release
      - name: Performance guards
        run: dotnet test tests/PdfEditor.Perf.Tests --configuration Release --no-build
        env:
          PDF_EDITOR_PERF_SLACK: "3"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run Playwright suite (extension + native host)
        working-directory: e2e
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/

  package-dry-run:
    # Proves the packaging pipeline (scripts/package-extension.sh and
    # scripts/package-bundle.sh, plus what they depend on -- generate-icons.py,
    # extension/manifest.json, the native host's self-contained publish) still produces
    # valid artifacts. These are the same scripts release-candidate.yml and
    # release-extension.yml invoke for real releases, but neither triggers on a PR, so
    # without this job a regression in packaging would only surface at release time.
    # The bundle is built for just one platform here to keep PR runs fast; the release
    # workflows build the full desktop matrix. Runs on every push and PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Package extension
        run: ./scripts/package-extension.sh dist
      - name: Package all-in-one bundle (linux-x64 only, smoke check for the release matrix)
        run: ./scripts/package-bundle.sh linux-x64 dist
      - uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-extension-dry-run
          path: dist/pdf-editor-extension-*.zip
          if-no-files-found: error
          retention-days: 7

  test-bundles:
    # Builds the all-in-one bundle (browser extension + self-contained native host +
    # install scripts) for every desktop platform and uploads each as a downloadable
    # artifact, so any push/PR can be installed and tested end-to-end without a local
    # .NET SDK. Grab the one for your OS from this run's "Artifacts" section, unzip it,
    # load extension/ unpacked, and run the bundled install script (see INSTALL.md).
    # The four platforms build in parallel, so wall-clock time stays close to one build.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, linux-x64, osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build all-in-one bundle (${{ matrix.rid }})
        run: ./scripts/package-bundle.sh "${{ matrix.rid }}" dist
      - uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-bundle-${{ matrix.rid }}
          path: dist/pdf-editor-bundle-${{ matrix.rid }}.zip
          if-no-files-found: error
          retention-days: 14
