name: Release Extension

# Handles releases created by a human (a "release: published" event). Automated release
# candidates do NOT reach this workflow: release-candidate.yml creates them with the
# built-in GITHUB_TOKEN, and GitHub's anti-recursion rule means a GITHUB_TOKEN-created
# release never fires "release: published" for another workflow -- so release-candidate.yml
# builds, tests, packages, and attaches the RC zip itself.
#
#   - Promoting to a real release: manually create a new GitHub Release targeting an RC's
#     commit, with a clean tag ("vX.Y.Z", no "-<build>" suffix) and "Set as a pre-release"
#     unchecked. Because a human created it, it fires this workflow: build, test, package,
#     attach the zip, and -- because it is not a prerelease -- deploy to the Chrome Web Store.
#   - A prerelease created manually in the GitHub UI (or a workflow_dispatch run) also fires
#     this workflow but stops after packaging; only a non-prerelease publish deploys.
#
# Whether the store-deploy job runs is decided by the release's `prerelease` flag -- see the
# "publish-to-chrome-web-store" job's `if:`. Tests must pass in `verify` before either path
# packages or deploys anything.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_to_store:
        description: "Also upload the package to the Chrome Web Store (requires CHROME_* secrets)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build
        run: dotnet build --configuration Release
      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  package:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.manifest_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine the version to package
        id: version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag_name="$TAG_NAME"       # e.g. v1.0.1-57 or v1.0.1
            version_part="${tag_name#v}"
            if [[ "$version_part" == *-* ]]; then
              base_version="${version_part%%-*}"                  # 1.0.1
              build_id="${version_part#*-}"                        # 57
              manifest_version="${base_version}.${build_id}"       # 1.0.1.57 (Chrome allows up to 4 parts)
            else
              manifest_version="$version_part"                    # 1.0.1
            fi
            is_prerelease="$RELEASE_PRERELEASE"

            # A non-prerelease publish deploys to the Chrome Web Store -- refuse to do
            # that for anything but a clean "vX.Y.Z" tag, so an RC-style tag can never
            # accidentally ship just because someone unchecked "pre-release" by mistake.
            if [[ "$is_prerelease" == "false" && ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::'$tag_name' is not a plain vX.Y.Z tag but this release isn't marked as a pre-release. Refusing to publish a release-candidate-style tag as a final release."
              exit 1
            fi
          else
            # workflow_dispatch: leave manifest.json's committed version as-is.
            manifest_version=""
            is_prerelease="true"
          fi
          echo "manifest_version=$manifest_version" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Stamp manifest.json with the release version
        if: steps.version.outputs.manifest_version != ''
        run: |
          python3 - "${{ steps.version.outputs.manifest_version }}" <<'EOF'
          import json
          import sys

          path = "extension/manifest.json"
          with open(path) as f:
              manifest = json.load(f)
          manifest["version"] = sys.argv[1]
          with open(path, "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          EOF

      - name: Package extension
        id: package
        run: ./scripts/package-extension.sh dist
      - uses: actions/upload-artifact@v4
        with:
          name: pdf-editor-extension-v${{ steps.package.outputs.version }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

      - name: Package native host (all desktop platforms)
        run: |
          for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
            ./scripts/package-host.sh "$rid" dist
          done

      - name: Attach to the GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/pdf-editor-extension-*.zip
            dist/pdf-editor-host-*.zip

  publish-to-chrome-web-store:
    needs: package
    # Only a non-prerelease Release (the manual "promote" step) deploys to the store;
    # release candidates from release-candidate.yml are always prereleases and stop here.
    if: ${{ github.event.inputs.publish_to_store == 'true' || needs.package.outputs.is_prerelease == 'false' }}
    runs-on: ubuntu-latest
    environment: chrome-web-store
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pdf-editor-extension-v${{ needs.package.outputs.version }}
          path: dist
      - name: Check Chrome Web Store credentials are configured
        id: creds
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          if [[ -n "$EXTENSION_ID" && -n "$CLIENT_ID" \
                && -n "$CLIENT_SECRET" && -n "$REFRESH_TOKEN" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Chrome Web Store upload — CHROME_EXTENSION_ID/CHROME_CLIENT_ID/CHROME_CLIENT_SECRET/CHROME_REFRESH_TOKEN secrets are not all set. The packaged zip is still available as a build artifact for manual upload."
          fi
      - name: Upload (and publish) to the Chrome Web Store
        if: steps.creds.outputs.configured == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          zip_path=$(ls dist/*.zip | head -1)
          npx --yes chrome-webstore-upload-cli@3.3.2 upload \
            --source "$zip_path" \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"
          npx --yes chrome-webstore-upload-cli@3.3.2 publish \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"
